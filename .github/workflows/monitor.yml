name: Monitor BGW Vermietungen

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        id: monitor
        run: |
          set +e
          python monitor.py
          code=$?
          set -e

          if [ "$code" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "initialized=false" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 2 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "initialized=false" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 3 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "initialized=true" >> "$GITHUB_OUTPUT"
          else
            echo "Monitor failed with exit code $code"
            exit "$code"
          fi

      - name: Commit state updates
        if: steps.monitor.outputs.changed == 'true' || steps.monitor.outputs.initialized == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json
          if [ -f last_change.diff ]; then git add last_change.diff; fi
          if [ -f email_body.txt ]; then git add email_body.txt; fi

          if git diff --cached --quiet; then
            echo "No files changed to commit."
            exit 0
          fi

          git commit -m "chore: update monitor state"
          git push

      - name: Send email notification
        if: steps.monitor.outputs.changed == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: rafaeltoledanoillan@gmail.com
          EMAIL_SUBJECT: Website change detected on bgwiedikon.ch/vermietungen
          EMAIL_BODY_FILE: email_body.txt
        run: python send_email.py
